name: Build Eleventy site

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - eleventy-migration-hardening-20260520

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify
      - uses: actions/upload-artifact@v4
        with:
          name: eleventy-dist
          path: dist
